<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Instrument to Evaluate Governance Proposals: AI Policy Analysis at Scale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1a1a1a;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    .hero-content {
      max-width: 760px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 1rem;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #666;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.2;
      color: #111;
      margin-bottom: 1.75rem;
      letter-spacing: -0.01em;
    }

    .authors {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.25rem 1.5rem;
      margin-bottom: 2.5rem;
    }

    .authors span {
      font-size: 1.05rem;
      font-weight: 400;
      color: #444;
    }

    .authors span::after {
      content: '·';
      margin-left: 1.5rem;
      color: #ccc;
    }

    .authors span:last-child::after {
      content: '';
      margin-left: 0;
    }

    .affiliation {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 3rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    .btn-secondary {
      background: #fff;
      color: #333;
      border: 1px solid #d0d0d0;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    footer {
      text-align: center;
      padding: 1.25rem 2rem;
      background: #fff;
      border-top: 1px solid #eee;
    }

    footer p {
      font-size: 0.8rem;
      color: #999;
    }

    footer a {
      color: #666;
      text-decoration: none;
    }

    footer a:hover {
      color: #333;
    }

    @media (max-width: 600px) {
      .hero {
        padding: 3rem 1.25rem;
      }

      .authors span {
        font-size: 0.95rem;
      }

      .authors span::after {
        content: '';
        margin-left: 0;
      }

      .buttons {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero-content">
      <div class="badge">Research Paper</div>
      <h1>An Instrument to Evaluate Governance Proposals: AI Policy Analysis at Scale</h1>
      <div class="authors">
        <span>Paulo Carvão</span>
        <span>Isabel Adler</span>
        <span>Claudio Mayrink Verdun</span>
        <span>Jeffrey Zhou</span>
      </div>
      <p class="affiliation">Harvard Kennedy School</p>
      <div class="buttons">
        <a href="https://github.com/HKSCarvaoGroup/AI-Policy-Analysis-at-Scale" class="btn btn-primary" target="_blank" rel="noopener">

          Code
        </a>
        <a href="#" class="btn btn-secondary" onclick="return false;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Paper (coming soon)
        </a>
      </div>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 <a href="https://github.com/HKSCarvaoGroup">HKS Carvão Group</a></p>
  </footer>
</body>
</html>
